<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kankacord Web</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #313338; color: #dbdee1; overflow: hidden; }
        
        /* Sol Menü (Sidebar) */
        .sidebar { width: 260px; background-color: #2b2d31; display: flex; flex-direction: column; border-right: 1px solid #1f2023; }
        .user-profile { padding: 15px; background-color: #232428; border-bottom: 1px solid #1f2023; font-weight: bold; color: #fff; }
        .section-title { padding: 10px 15px; font-size: 12px; font-weight: bold; color: #949ba4; text-transform: uppercase; letter-spacing: 0.5px; }
        .channel-list { flex: 1; overflow-y: auto; padding: 5px; }
        .channel-item { padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; }
        .channel-item:hover { background-color: #35373c; color: #f2f3f5; }
        .channel-item.active { background-color: #404249; color: #fff; font-weight: bold; }
        .badge { background-color: #23a55a; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* Sağ Sohbet Alanı */
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: #313338; }
        .chat-header { height: 49px; padding: 0 20px; display: flex; align-items: center; background-color: #313338; border-bottom: 1px solid #1f2023; font-weight: bold; color: #fff; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Mesaj Balonları */
        .message { display: flex; flex-direction: column; max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .message.incoming { background-color: #383a40; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.outgoing { background-color: #005c4b; color: #e9edef; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-meta { font-size: 11px; color: #949ba4; margin-bottom: 4px; font-weight: bold; }
        .message.outgoing .msg-meta { color: #86bfae; }

        /* Girdi Alanı */
        .input-area { padding: 20px; background-color: #313338; }
        .input-wrapper { display: flex; background-color: #383a40; border-radius: 8px; padding: 10px; align-items: center; }
        .input-wrapper input { flex: 1; background: none; border: none; color: #dbdee1; font-size: 15px; outline: none; padding: 5px; }
        .input-wrapper button { background-color: #5865f2; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .input-wrapper button:hover { background-color: #4752c4; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile" id="my-profile">Yükleniyor...</div>
        
        <div class="section-title">Odalar</div>
        <div class="channel-list">
            <div class="channel-item active" id="target-all" onclick="switchTarget('all')"># genel-sohbet</div>
        </div>

        <div class="section-title">Kullanıcılar</div>
        <div class="channel-list" id="users-box">
            </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chat-title"># genel-sohbet</div>
        <div class="messages-container" id="messages-box"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="Mesajınızı yazın..." onkeydown="if(event.key === 'Enter') sendMsg()">
                <button onclick="sendMsg()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. AYARLAR VE PARAMETRELER ---
        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('user') || "Bilinmeyen";
        const myName = urlParams.get('name') || myId;

        const WS_URL = "wss://kankacord.onrender.com";
        const SUPABASE_MESSAGES_URL = "https://kpspzbtxlefxjfjoihka.supabase.co/rest/v1/messages";
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwc3B6YnR4bGVmeGpmam9paGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjY1MTMsImV4cCI6MjA5NDAwMjUxM30.AS-uUbX0FGmNgZS4LmuvXmi_ybntc7_CHPyl0c9OP3w";

        let ws;
        let activeTarget = "all"; // Kiminle konuşuyoruz? 'all' veya 'kullanici_id'
        let allMessages = [];     // Hafızadaki filtrelenmiş tüm mesajlar (Hem geçmiş hem canlı)
        let onlineUsers = [];     // Sunucudan gelen anlık online listesi

        document.getElementById('my-profile').innerText = `👤 ${myName} (@${myId})`;

        // --- 2. GÜVENLİ GEÇMİŞ MESAJLARI ÇEKME (KRİTİK SAFHA) ---
        async function loadSecureHistory() {
            try {
                // GÜVENLİK FİLTRESİ: Sadece göndereni BEN olan, alıcısı BEN olan veya HERKESE (all) giden mesajları çek.
                // Başkalarının birbiriyle olan özel mesajları veritabanından asla tarayıcıya inemez!
                const secureFilter = `?or=(sender.eq.${myId},receiver.eq.${myId},receiver.eq.all)&order=created_at.asc`;
                
                const res = await fetch(SUPABASE_MESSAGES_URL + secureFilter, {
                    method: "GET",
                    headers: {
                        "apikey": KEY,
                        "Authorization": `Bearer ${KEY}`,
                        "Content-Type": "application/json"
                    }
                });
                
                allMessages = await res.json();
                renderMessages();
            } catch (err) {
                console.error("Geçmiş mesajlar çekilirken hata oluştu:", err);
            }
        }

        // --- 3. WEBSOCKET BAĞLANTISI VE CANLI YÖNETİM ---
        function initWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                // Sunucuya kim olduğumuzu bildiriyoruz
                ws.send(jsonStr({ type: "hello", u: myId }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === "users") {
                    // Sunucudan kullanıcı listesi güncellemesi geldi
                    onlineUsers = data.online_users || [];
                    renderUsersList(data.all_users || []);
                } 
                else if (data.type === "msg") {
                    // Canlı bir mesaj geldi, hafızaya ekle ve ekranı güncelle
                    allMessages.push({
                        sender: data.u,
                        receiver: data.to || "all",
                        content: data.m
                    });
                    renderMessages();
                }
            };

            ws.onclose = () => {
                console.log("Soket kapandı, 3 saniye sonra tekrar bağlanıyor...");
                setTimeout(initWebSocket, 3000);
            };
        }

        // --- 4. EKRANA MESAJLARI BASMA VE FİLTRELEME (UI SEVİYESİ) ---
        function renderMessages() {
            const box = document.getElementById("messages-box");
            box.innerHTML = "";

            // Hafızadaki güvenli mesajları o an seçili olan odaya/kişiye göre süzüyoruz
            const filtered = allMessages.filter(msg => {
                if (activeTarget === "all") {
                    return msg.receiver === "all";
                } else {
                    // Özel mesaj filtresi: (Ben ona attıysam) veya (O bana attıysa)
                    return (msg.sender === myId && msg.receiver === activeTarget) || 
                           (msg.sender === activeTarget && msg.receiver === myId);
                }
            });

            filtered.forEach(msg => {
                const isMe = msg.sender === myId;
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${isMe ? 'outgoing' : 'incoming'}`;

                const meta = document.createElement("div");
                meta.className = "msg-meta";
                meta.innerText = isMe ? "Sen" : `@${msg.sender}`;

                const text = document.createElement("div");
                text.innerText = msg.content;

                msgDiv.appendChild(meta);
                msgDiv.appendChild(text);
                box.appendChild(msgDiv);
            });

            // Ekranı en aşağı kaydır
            box.scrollTop = box.scrollHeight;
        }

        // --- 5. SOL MENÜDE KULLANICILARI GÖSTERME ---
        function renderUsersList(allUsers) {
            const uBox = document.getElementById("users-box");
            uBox.innerHTML = "";

            allUsers.forEach(user => {
                if (user.id === myId) return; // Kendimizi listede göstermiyoruz

                const isOnline = onlineUsers.includes(user.id);
                const item = document.createElement("div");
                item.className = `channel-item ${activeTarget === user.id ? 'active' : ''}`;
                item.id = `target-${user.id}`;
                item.onclick = () => switchTarget(user.id, user.display_name);

                const nameSpan = document.createElement("span");
                nameSpan.innerText = `👤 ${user.display_name} (@${user.id})`;
                item.appendChild(nameSpan);

                if (isOnline) {
                    const badge = document.createElement("span");
                    badge.className = "badge";
                    badge.innerText = "çevrimiçi";
                    item.appendChild(badge);
                }

                uBox.appendChild(item);
            });
        }

        // --- 6. HEDEF DEĞİŞTİRME (GENEL ODA <-> ÖZEL MESAJ) ---
        function switchTarget(target, displayName = "") {
            activeTarget = target;
            
            // Aktif CSS sınıfını güncelle
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`target-${target}`).classList.add('active');

            // Başlığı değiştir
            if (target === "all") {
                document.getElementById("chat-title").innerText = "# genel-sohbet";
            } else {
                document.getElementById("chat-title").innerText = `💬 ${displayName} ile Özel Mesajlaşma`;
            }

            // Yeni hedefe göre mesaj kutusunu yeniden çiz
            renderMessages();
        }

        // --- 7. MESAJ GÖNDERME SİSTEMİ ---
        function sendMsg() {
            const inp = document.getElementById("msg-input");
            const text = inp.text.strip ? inp.value.strip() : inp.value.trim();
            if (!text) return;

            // Sunucuya paketi gönderiyoruz
            const payload = {
                type: "msg",
                u: myId,
                to: activeTarget,
                m: text
            };

            ws.send(jsonStr(payload));
            inp.value = "";
        }

        // --- YARDIMCI FONKSİYONLAR ---
        function jsonStr(obj) { return JSON.stringify(obj); }

        // SAYFA AÇILDIĞINDA BAŞLAT
        window.onload = () => {
            loadSecureHistory();
            initWebSocket();
        };
    </script>
</body>
        </html>
